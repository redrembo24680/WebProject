services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-personal_note_manager}
      POSTGRES_USER: ${POSTGRES_USER:-personal_note_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-personal_note_password}
    ports:
      - "5432:5432"

  backend:
    build:
      context: ./backend
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./backend/static:/app/static
    depends_on:
      - db

  adminer:
    image: adminer:latest
    restart: unless-stopped
    environment:
      ADMINER_DEFAULT_SERVER: db
    ports:
      - "8080:8080"
    depends_on:
      - db
